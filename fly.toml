app = "squadpitch-api"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # Health check — Fly restarts the machine if this fails 3 times in a row.
  # Catches hung processes, OOM zombies, and dead DB connections.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[env]
  NODE_ENV = "production"
  ENABLE_WORKERS = "true"

[[vm]]
  size = "performance-1x"
  memory = "2gb"
  swap_size_mb = 512
