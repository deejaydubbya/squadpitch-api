app = "squadpitch-api"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  ENABLE_WORKERS = "true"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
